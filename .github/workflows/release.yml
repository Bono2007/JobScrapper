name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh && echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Python deps + PyInstaller
        run: |
          cd python
          uv sync --extra dev

      - name: Build Python binary (Mac)
        run: |
          cd python
          uv run pyinstaller jobscrapper.spec --distpath ../resources/python-dist/mac --workpath /tmp/pyinstaller-mac

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node deps
        run: npm ci

      - name: Build Electron (Mac)
        run: npm run build && electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: JobScrapper-mac
          path: release/*.dmg
          if-no-files-found: error

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          powershell -ExecutionPolicy ByPass -c "irm https://astral.sh/uv/install.ps1 | iex"
          echo "$env:USERPROFILE\.local\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Python deps + PyInstaller
        run: |
          cd python
          uv sync --extra dev

      - name: Build Python binary (Windows)
        run: |
          cd python
          uv run pyinstaller jobscrapper.spec --distpath ..\resources\python-dist\win --workpath C:\Temp\pyinstaller-win

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node deps
        run: npm ci

      - name: Build Electron (Windows)
        run: npm run build && electron-builder --win --publish never

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: JobScrapper-win
          path: release/*.exe
          if-no-files-found: error

  create-release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
