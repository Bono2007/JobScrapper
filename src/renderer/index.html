<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; connect-src http://127.0.0.1:*; script-src 'self'">
  <title>JobScrapper</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav id="tabs">
    <button class="tab-btn active" data-tab="search">Recherche</button>
    <button class="tab-btn" data-tab="results">Résultats <span id="results-count"></span></button>
    <button class="tab-btn" data-tab="detail">Détail</button>
  </nav>

  <main>
    <section id="tab-search" class="tab-panel active"></section>
    <section id="tab-results" class="tab-panel"></section>
    <section id="tab-detail" class="tab-panel"></section>
  </main>

  <div id="modal-overlay" class="hidden">
    <div id="modal-box"></div>
  </div>

  <script src="../../dist/renderer.js"></script>
</body>
</html>
